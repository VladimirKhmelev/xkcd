name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build images
        run: docker compose build

      - name: Start services
        run: docker compose up -d api words update search postgres nats frontend

      - name: Wait for API to be ready
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:28080/api/ping && break
            echo "Waiting for API... ($i)"
            sleep 5
          done

      - name: Wait for frontend to be ready
        run: |
          for i in $(seq 1 15); do
            curl -sf http://localhost:28090/ && break
            echo "Waiting for frontend... ($i)"
            sleep 3
          done

      - name: Smoke test frontend
        run: |
          curl -sf http://localhost:28090/ | grep -q "XKCD Search"
          curl -sf "http://localhost:28090/?phrase=linux" | grep -q "XKCD Search"
          curl -sf http://localhost:28090/admin | grep -q "XKCD Admin"

      - name: Run tests
        run: docker compose run --rm tests

      - name: Collect logs on failure
        if: failure()
        run: docker compose logs

      - name: Stop services
        if: always()
        run: docker compose down -v

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: search-services/go.mod
          cache-dependency-path: search-services/go.sum

      - name: Install protolint
        run: go install github.com/yoheimuta/protolint/cmd/protolint@v0.53.0

      - name: Run linter
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.4.0
          working-directory: search-services

  unit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: search-services/go.mod
          cache-dependency-path: search-services/go.sum

      - name: Run unit tests
        run: make unit

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: cover.html
